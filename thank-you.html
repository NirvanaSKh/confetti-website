<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you! — Confetti &amp; Co.</title>
<style>
  :root{
    --coral:#FF5D73;--pink:#FF8FA3;--teal:#2EC4B6;--yellow:#FFD23F;
    --ink:#2B2545;--lav:#7C5CFF;--cream:#FFF7F2;--muted:#6a6382;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(circle at 10% 20%,rgba(255,210,63,.28),transparent 24%),
      radial-gradient(circle at 92% 16%,rgba(46,196,182,.26),transparent 26%),
      radial-gradient(circle at 78% 88%,rgba(124,92,255,.14),transparent 30%),
      linear-gradient(160deg,#FFEEF1,#FFF7F2 65%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:26px;padding:48px 40px;max-width:520px;text-align:center;
    box-shadow:0 20px 44px rgba(124,92,255,.16);border:1px solid #f4ecf6;position:relative;overflow:hidden;}
  .logo{font-size:28px;font-weight:800;color:var(--coral);letter-spacing:-.5px;margin-bottom:24px;}
  .logo .a{color:var(--lav);} .logo .c{color:var(--teal);}
  .tick{width:84px;height:84px;border-radius:50%;background:var(--teal);margin:0 auto 22px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(46,196,182,.34);}
  .tick svg{width:44px;height:44px;}
  h1{font-size:30px;letter-spacing:-.5px;margin-bottom:14px;}
  h1 span{color:var(--coral);}
  p{font-size:16px;color:#554e70;line-height:1.6;margin-bottom:12px;}
  .btn{display:inline-block;background:var(--coral);color:#fff;font-weight:700;padding:13px 30px;
    border-radius:30px;box-shadow:0 8px 18px rgba(255,93,115,.32);margin-top:20px;text-decoration:none;
    transition:transform .15s;}
  .btn:hover{transform:translateY(-2px);}
  .confetti{position:absolute;border-radius:2px;opacity:.85;}
</style>
</head>
<body>
  <div class="card">
    <span class="confetti" style="top:24px;left:34px;width:11px;height:11px;background:var(--yellow);transform:rotate(20deg);"></span>
    <span class="confetti" style="top:60px;right:40px;width:10px;height:10px;background:var(--coral);border-radius:50%;"></span>
    <span class="confetti" style="bottom:40px;left:50px;width:9px;height:9px;background:var(--lav);transform:rotate(40deg);"></span>
    <span class="confetti" style="bottom:70px;right:56px;width:11px;height:11px;background:var(--teal);border-radius:50%;"></span>

    <div class="logo">Confetti <span class="a">&amp;</span> <span class="c">Co.</span></div>

    <div class="tick">
      <svg viewBox="0 0 52 52" fill="none"><path d="M14 27 l8 8 l16 -18" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <h1>Thank you! <span>🎉</span></h1>
    <p>Your message has come through safely. Reka reads every enquiry and review personally and will be in touch soon.</p>
    <p style="font-size:14px;color:var(--muted);">Left a review? It'll appear on the website once Reka has approved it.</p>

    <a class="btn" href="/">Back to the website</a>
  </div>
</body>
</html>
